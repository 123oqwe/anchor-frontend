<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Anchor Cloud</title>
<style>
  :root {
    --bg: #0b0c10;
    --panel: rgba(255,255,255,0.03);
    --panel-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.06);
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --muted2: #6b7280;
    --accent: #f59e0b;
    --ok: #10b981;
    --err: #ef4444;
    --pend: #3b82f6;
    --run: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--fg); font: 14px -apple-system, SF Pro Text, system-ui, sans-serif; min-height: 100vh; }
  body { padding: max(env(safe-area-inset-top), 12px) 12px max(env(safe-area-inset-bottom), 12px); }
  h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted2); }
  h1 .dot.live { background: var(--ok); box-shadow: 0 0 8px rgba(16,185,129,0.6); }
  h2 { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin: 16px 0 6px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
  .panel + .panel { margin-top: 8px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .row.spread { justify-content: space-between; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; font: 10px ui-monospace, SF Mono, monospace; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--muted); }
  .tag.ok { background: rgba(16,185,129,0.1); color: var(--ok); }
  .tag.err { background: rgba(239,68,68,0.1); color: var(--err); }
  .tag.pend { background: rgba(59,130,246,0.1); color: var(--pend); }
  .tag.run { background: rgba(245,158,11,0.1); color: var(--run); }
  .muted { color: var(--muted); }
  .muted2 { color: var(--muted2); }
  .list { display: flex; flex-direction: column; gap: 6px; }
  .item { padding: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
  .item.clickable { cursor: pointer; }
  .item.clickable:active { background: var(--panel-hover); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 14px; font-weight: 500; background: var(--panel); border: 1px solid var(--border); color: var(--fg); border-radius: 10px; -webkit-appearance: none; appearance: none; cursor: pointer; font-size: 14px; }
  .btn:active { background: var(--panel-hover); }
  .btn.primary { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.25); color: var(--accent); }
  .btn.block { width: 100%; }
  input, textarea { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--border); color: var(--fg); border-radius: 10px; padding: 10px 12px; font: inherit; -webkit-appearance: none; appearance: none; }
  textarea { resize: none; min-height: 60px; font-size: 14px; }
  .hdr-info { font-size: 10px; color: var(--muted2); }
  .footer { margin-top: 24px; text-align: center; font-size: 10px; color: var(--muted2); padding: 8px 0 16px; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 100; }
  .modal-backdrop.open { display: flex; }
  .modal { width: 100%; background: var(--bg); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 16px; padding-bottom: max(env(safe-area-inset-bottom), 16px); max-height: 80vh; overflow-y: auto; }
  @media (min-width: 640px) { .modal-backdrop { align-items: center; justify-content: center; } .modal { max-width: 520px; border-radius: 16px; } }
  .empty { padding: 24px; text-align: center; color: var(--muted2); font-size: 13px; }
  .icon { display: inline-block; width: 14px; height: 14px; vertical-align: -2px; }
</style>
</head>
<body>
<h1>
  <span id="dot" class="dot"></span>
  Anchor
  <span class="hdr-info" style="margin-left:auto" id="hdrInfo">…</span>
</h1>

<h2>Devices</h2>
<div id="devices" class="list"></div>

<h2>Agents</h2>
<div id="agents" class="list"></div>

<h2>Recent jobs</h2>
<div id="jobs" class="list"></div>

<div class="footer">
  Anchor Cloud · single-user MVP · <span id="lastRefresh">—</span>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="row spread" style="margin-bottom: 12px">
      <strong id="modalTitle" style="font-size: 15px">Run agent</strong>
      <button class="btn" id="modalClose" style="padding: 6px 10px; font-size: 12px">Close</button>
    </div>
    <div class="muted" id="modalSubtitle" style="font-size: 11px; margin-bottom: 8px"></div>
    <textarea id="modalMsg" placeholder="Message to agent…" rows="5"></textarea>
    <button class="btn primary block" id="modalGo" style="margin-top: 12px">Run</button>
    <div id="modalResult" style="margin-top: 10px; font-size: 12px"></div>
  </div>
</div>

<script>
(function () {
  const TOKEN = new URLSearchParams(location.search).get("token") || localStorage.getItem("anchor_token") || "";
  if (TOKEN) localStorage.setItem("anchor_token", TOKEN);

  const api = async (method, path, body) => {
    const headers = { "Content-Type": "application/json" };
    if (TOKEN) headers["Authorization"] = "Bearer " + TOKEN;
    const r = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  };

  const byId = (id) => document.getElementById(id);
  const devicesEl = byId("devices"), agentsEl = byId("agents"), jobsEl = byId("jobs");
  const dot = byId("dot"), hdr = byId("hdrInfo"), lastRefresh = byId("lastRefresh");

  const modal = byId("modal"), modalTitle = byId("modalTitle"), modalSubtitle = byId("modalSubtitle");
  const modalMsg = byId("modalMsg"), modalGo = byId("modalGo"), modalResult = byId("modalResult");
  byId("modalClose").onclick = () => modal.classList.remove("open");
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("open"); };

  let currentAgent = null;

  const openAgent = (a) => {
    currentAgent = a;
    modalTitle.textContent = a.agent;
    modalSubtitle.textContent = (a.tools.join(", ") || "no tools") + " · " + a.devices.length + " device" + (a.devices.length === 1 ? "" : "s");
    modalMsg.value = "";
    modalResult.textContent = "";
    modal.classList.add("open");
    setTimeout(() => modalMsg.focus(), 200);
  };

  modalGo.onclick = async () => {
    if (!currentAgent) return;
    const message = modalMsg.value.trim();
    if (!message) { modalResult.textContent = "Enter a message first"; return; }
    modalGo.disabled = true;
    modalResult.innerHTML = "<span class='muted'>dispatching…</span>";
    try {
      const r = await api("POST", "/api/run", { agentName: currentAgent.agent, message });
      if (r.error) throw new Error(r.error);
      modalResult.innerHTML = "<span class='tag ok'>queued</span> jobId " + r.jobId + " → " + (r.deviceId || "any");
      refresh();
    } catch (e) {
      modalResult.innerHTML = "<span class='tag err'>error</span> " + e.message;
    } finally {
      modalGo.disabled = false;
    }
  };

  const stateTag = (s) => {
    const cls = s === "succeeded" ? "ok" : s === "failed" ? "err" : s === "running" || s === "claimed" ? "run" : "pend";
    return `<span class='tag ${cls}'>${s}</span>`;
  };
  const fmtTime = (iso) => {
    try {
      const d = new Date(iso), diff = (Date.now() - d) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return Math.floor(diff / 60) + "m";
      if (diff < 86400) return Math.floor(diff / 3600) + "h";
      return Math.floor(diff / 86400) + "d";
    } catch { return iso; }
  };

  async function refresh() {
    try {
      const [devices, agents, jobs] = await Promise.all([
        api("GET", "/api/devices"),
        api("GET", "/api/agents"),
        api("GET", "/api/jobs"),
      ]);

      // Devices
      const onlineRunners = devices.filter((d) => d.kind === "runner" && d.online).length;
      dot.classList.toggle("live", onlineRunners > 0);
      hdr.textContent = `${onlineRunners} runner${onlineRunners === 1 ? "" : "s"}`;

      devicesEl.innerHTML = devices.length
        ? devices.map((d) => `
            <div class="item">
              <div class="row spread">
                <div>
                  <strong>${escapeHtml(d.deviceId)}</strong>
                  <span class="muted" style="font-size:11px"> · ${d.platform}</span>
                </div>
                ${d.online ? "<span class='tag ok'>online</span>" : "<span class='tag'>offline</span>"}
              </div>
              <div class="muted2" style="font-size: 10px; margin-top: 4px">
                ${d.kind} · ${d.bridges.length} bridges · ${d.agentCount} agents · seen ${fmtTime(d.lastSeen)}
              </div>
            </div>`).join("")
        : "<div class='empty'>No devices connected yet. Start the Anchor runner with ANCHOR_CLOUD_URL set.</div>";

      // Agents
      agentsEl.innerHTML = agents.length
        ? agents.map((a) => `
            <div class="item clickable" data-agent='${escapeHtml(JSON.stringify(a))}'>
              <div class="row spread">
                <strong>${escapeHtml(a.agent)}</strong>
                <span class="muted" style="font-size: 11px">${a.devices.length} device${a.devices.length === 1 ? "" : "s"}</span>
              </div>
              <div class="muted2" style="font-size: 10px; margin-top: 4px">
                ${a.tools.slice(0, 6).map((t) => `<span class="tag" style="margin-right: 4px">${escapeHtml(t)}</span>`).join("")}
              </div>
            </div>`).join("")
        : "<div class='empty'>No agents. Create one in the desktop UI at /agents.</div>";
      agentsEl.querySelectorAll(".item").forEach((el) =>
        el.addEventListener("click", () => openAgent(JSON.parse(el.dataset.agent)))
      );

      // Jobs
      jobsEl.innerHTML = jobs.length
        ? jobs.slice(0, 40).map((j) => `
            <div class="item">
              <div class="row spread">
                <span>${escapeHtml(j.name)}</span>
                ${stateTag(j.state)}
              </div>
              <div class="muted2" style="font-size: 10px; margin-top: 4px">
                ${j.actionType} · ${j.deviceId || "—"} · ${fmtTime(j.updatedAt)}
              </div>
              ${j.result ? `<div class="muted" style="font-size:11px;margin-top:4px">${escapeHtml(j.result).slice(0, 200)}</div>` : ""}
              ${j.error ? `<div style="font-size:11px;margin-top:4px;color:var(--err)">${escapeHtml(j.error).slice(0, 200)}</div>` : ""}
            </div>`).join("")
        : "<div class='empty'>No jobs yet.</div>";

      lastRefresh.textContent = new Date().toLocaleTimeString();
    } catch (e) {
      hdr.textContent = "error";
      dot.classList.remove("live");
      devicesEl.innerHTML = "<div class='empty'>Cannot reach cloud relay. " + escapeHtml(e.message) + "</div>";
    }
  }

  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  }

  refresh();
  setInterval(refresh, 5000);
})();
</script>
</body>
</html>
