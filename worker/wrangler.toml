name = "anchor-cloud"
main = "src/index.ts"
compatibility_date = "2026-04-20"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ANCHOR_HUB"
class_name = "AnchorHub"

# Assets for mobile UI (Cloudflare Workers Static Assets)
[assets]
directory = "public"
binding = "ASSETS"

# Cron trigger — fires every minute. DO decides which user crons are due.
[triggers]
crons = ["* * * * *"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AnchorHub"]

[vars]
# AUTH_TOKEN is injected via `wrangler secret put AUTH_TOKEN` — hardcoded only for local dev
# AUTH_TOKEN = "change-me"
